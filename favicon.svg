<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="ef-leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="ef-stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="#0f2e1a"/>

  <!-- Leaf (top-right) -->
  <path d="M26 6 C26 6 41 10 41 24 C41 33 34 38 26 39 C26 39 26 22 11 18 C11 18 15 6 26 6 Z"
        fill="url(#ef-leaf)" opacity="0.95"/>
  <path d="M26 6 C26 6 11 10 11 24 C11 33 18 38 26 39 C26 39 26 22 11 18 C11 18 15 6 26 6 Z"
        fill="white" opacity="0.13"/>

  <!-- Leaf veins -->
  <path d="M26 39 C26 39 26 22 11 18" stroke="#166534" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
  <path d="M26 30 C30 26 36 24 41 24" stroke="#166534" stroke-width="0.9" stroke-linecap="round" opacity="0.4"/>
  <path d="M26 22 C30 19 35 18 38 17" stroke="#166534" stroke-width="0.9" stroke-linecap="round" opacity="0.4"/>
  <path d="M26 30 C22 26 16 24 11 24" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.22"/>
  <path d="M26 22 C22 19 17 18 14 17" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.22"/>

  <!-- Microcontroller chip (bottom-left) -->
  <rect x="5" y="30" width="18" height="14" rx="2" fill="#1e3a2a" stroke="#4ade80" stroke-width="1"/>
  <rect x="7" y="33" width="14" height="5" rx="1" fill="#4ade80" opacity="0.18"/>
  <circle cx="14" cy="37" r="1.5" fill="#4ade80" opacity="0.7"/>

  <!-- Left pins -->
  <line x1="5"  y1="33" x2="3"  y2="33" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>
  <line x1="5"  y1="36" x2="3"  y2="36" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>
  <line x1="5"  y1="39" x2="3"  y2="39" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>
  <line x1="5"  y1="42" x2="3"  y2="42" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>

  <!-- Right pins -->
  <line x1="23" y1="33" x2="25" y2="33" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>
  <line x1="23" y1="36" x2="25" y2="36" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>
  <line x1="23" y1="39" x2="25" y2="39" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>
  <line x1="23" y1="42" x2="25" y2="42" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>

  <!-- Top pins -->
  <line x1="9"  y1="30" x2="9"  y2="28" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="30" x2="14" y2="28" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>
  <line x1="19" y1="30" x2="19" y2="28" stroke="#4ade80" stroke-width="1" stroke-linecap="round"/>

  <!-- Connector wire: chip to leaf -->
  <path d="M19 28 C22 25 24 30 26 39" stroke="#4ade80" stroke-width="0.8" stroke-linecap="round" stroke-dasharray="1.5 1.5" opacity="0.5"/>
</svg>
